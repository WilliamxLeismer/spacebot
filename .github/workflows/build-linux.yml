name: Build Linux Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y libssl-dev pkg-config protobuf-compiler cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Build web UI
        run: cd interface && npm install && npm run build

      - name: Build binary
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
            name: spacebot-linux-x86_64
            path: target/release/spacebot
            retention-days: 7
